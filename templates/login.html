{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4" id="form-title">Вход</h2>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" novalidate>
        <input type="hidden" name="action" id="action-input" value="login">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control">
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3" id="email-group" style="display:none;">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
                <div class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control">
                <div class="invalid-feedback"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submit-btn">Войти</button>
        </form>
        <p class="mt-3 text-center">
            <a href="#" id="toggle-link">Нет аккаунта? Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
