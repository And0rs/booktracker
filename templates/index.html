{% extends "base.html" %}
{% block content %}
<h1>Каталог книг</h1>
<form class="mb-4" method="GET">
    <input type="text" name="q" class="form-control" placeholder="Поиск по названию или автору..." value="{{ q }}">
</form>
<div class="row">
    {% for book in books %}
    <div class="col-md-4 mb-3">
        <div class="card">
            {% if book.cover_url %}
            <img src="{{ book.cover_url }}" class="card-img-top" style="height:200px;object-fit:cover;">
            {% endif %}
            <div class="card-body">
                <h5 class="card-title">{{ book.title }}</h5>
                <p class="card-text">{{ book.author_name }} ({{ book.year }})</p>
                <a href="{{ url_for('book_page', id=book.id) }}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>Книг пока нет.</p>
    {% endfor %}
</div>
{% endblock %}
